services:
  - type: web
    name: syncflick-api
    env: python
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        sync: false
      - key: VIDEOS_DIR
        value: /tmp/videos
      - key: MAX_FILE_SIZE_MB
        value: "2048"
